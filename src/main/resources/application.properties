# File: src/main/resources/application.properties
server.port=8080
server.servlet.context-path=/api/v1
spring.application.name=Bank-System

spring.datasource.url=jdbc:mysql://localhost:3306/bank_system_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

app.jwt.secret=your-super-secret-key-min-256-bits-long-for-security-purposes-change-this-immediately
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

app.encryption.algorithm=AES/GCM/NoPadding
app.encryption.key-size=256
app.encryption.iv-size=96

logging.level.root=INFO
logging.level.com.fintrack=DEBUG
logging.level.org.springframework.security=DEBUG
logging.file.name=logs/bank-system.log
logging.file.max-size=10MB
logging.file.max-history=10

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized

spring.security.user.name=admin
spring.security.user.password=admin123