# File: src/main/resources/application.properties
server.port=8080
spring.application.name=Bank-System

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bank_system_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

app.encryption.algorithm=AES/GCM/NoPadding
app.encryption.key-size=256
app.encryption.iv-size=96
app.encryption.secret=${ENCRYPTION_SECRET}

logging.level.root=INFO
logging.level.com.fintrack=DEBUG
logging.level.org.springframework.security=DEBUG
logging.file.name=logs/bank-system.log
logging.file.max-size=10MB
logging.file.max-history=10

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
